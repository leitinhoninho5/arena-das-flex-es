<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena das Flexões</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="background"></div>

  <main class="container">

    <header class="hero">
      <h1>⚔️ ARENA DAS FLEXÕES ⚔️</h1>
      <p>O Reino dos Guerreiros das Flexões</p>
    </header>

    <section class="guild-box">
      <h2>🔥 Guild XP</h2>

      <div class="progress">
        <div id="guildBar" class="progress-fill"></div>
      </div>

      <p id="guildText">0 / 10000 XP</p>
    </section>

    <section class="register-box">
      <h2>Registrar Flexões</h2>

      <input type="text" id="playerName" placeholder="Seu nome">
      <input type="number" id="pushups" placeholder="Quantidade de flexões">

      <button onclick="addPushups()">Registrar Treino</button>
    </section>

    <section class="ranking-box">
      <h2>🏆 Ranking dos Guerreiros</h2>

      <div id="ranking">Carregando...</div>
    </section>

  </main>

  <!-- 🔥 FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, increment }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔥 SEU CONFIG (já pronto pra usar)
    const firebaseConfig = {
      apiKey: "AIzaSyDSNZY4u4tJx9C2la-g_VeL_5VEVsXGvWc",
      authDomain: "arenadasflexoes.firebaseapp.com",
      databaseURL: "https://arenadasflexoes-default-rtdb.firebaseio.com",
      projectId: "arenadasflexoes",
      storageBucket: "arenadasflexoes.firebasestorage.app",
      messagingSenderId: "858312051523",
      appId: "1:858312051523:web:c7acbff534161c23f4bdf6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, "players");

    // 🔥 LER RANKING EM TEMPO REAL
    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        document.getElementById("ranking").innerHTML = "Sem dados ainda.";
        return;
      }

      let lista = [];

      for (let id in data) {
        lista.push({
          nome: data[id].name,
          flexoes: data[id].flexoes
        });
      }

      lista.sort((a, b) => b.flexoes - a.flexoes);

      render(lista);
    });

function getCategory(pushups) {
if (pushups >= 1000) return "Mythic";
if (pushups >= 200) return "Legend";
if (pushups >= 100) return "Epic";
return "Veterano";
}

function getClassName(category) {
switch (category) {
case "Mythic":
return "mythic";
case "Legend":
return "legend";
case "Epic":
return "epic";
default:
return "veterano";
}
}

function render(lista) {

const ranking = document.getElementById("ranking");
ranking.innerHTML = "";

let guildXP = 0;

lista.forEach((player, index) => {

guildXP += player.flexoes;

const categoria = getCategory(player.flexoes);
const classe = getClassName(categoria);
const nivel = Math.floor(player.flexoes / 10);

ranking.innerHTML += `
  <div class="player-card ${classe}">

    <div class="player-name">
      #${index + 1} ${player.nome}
    </div>

    <div class="player-info">
      ${categoria} • Lv ${nivel}
    </div>

    <div class="player-info">
      ${player.flexoes} flexões
    </div>

  </div>
`;

});

document.getElementById("guildText").innerText =
guildXP + " / 10000 XP";

const porcentagem =
Math.min((guildXP / 10000) * 100, 100);

document.getElementById("guildBar").style.width =
porcentagem + "%";
}

    // 🔥 FUNÇÃO DO BOTÃO (REGISTRAR FLEXÕES)
    window.addPushups = function () {
      const name = document.getElementById("playerName").value;
      const pushups = Number(document.getElementById("pushups").value);

      if (!name || !pushups) return;

      const userRef = ref(db, "players/" + name.toLowerCase());

      update(userRef, {
        name: name,
        flexoes: increment(pushups)
      });
    };

  </script>

</body>
</html>
