<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Arena das Flexões</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    #ranking {
      margin-top: 20px;
      font-size: 20px;
    }

    .item {
      padding: 8px;
      margin: 5px;
      background: #222;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>🏆 Arena das Flexões</h1>

  <div id="ranking">Carregando ranking...</div>

  <!-- 🔥 FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔥 SEU FIREBASE CONFIG (CORRIGIDO)
    const firebaseConfig = {
      apiKey: "AIzaSyDSNZY4u4tJx9C2la-g_VeL_5VEVsXGvWc",
      authDomain: "arenadasflexoes.firebaseapp.com",
      databaseURL: "https://arenadasflexoes-default-rtdb.firebaseio.com",
      projectId: "arenadasflexoes",
      storageBucket: "arenadasflexoes.firebasestorage.app",
      messagingSenderId: "858312051523",
      appId: "1:858312051523:web:c7acbff534161c23f4bdf6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, "players");

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        document.getElementById("ranking").innerHTML = "Sem dados ainda.";
        return;
      }

      let lista = [];

      for (let id in data) {
        lista.push({
          nome: data[id].name,
          flexoes: data[id].flexoes
        });
      }

      lista.sort((a, b) => b.flexoes - a.flexoes);

      render(lista);
    });

    function render(lista) {
      const div = document.getElementById("ranking");
      div.innerHTML = "";

      lista.forEach((p, i) => {
        div.innerHTML += `
          <div class="item">
            ${i + 1}º ${p.nome} — ${p.flexoes} flexões
          </div>
        `;
      });
    }

  </script>

</body>
</html>
